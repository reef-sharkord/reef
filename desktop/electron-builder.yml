appId: com.reef.desktop
productName: REEF
copyright: Copyright © REEF

directories:
  output: release
  buildResources: build

# Don't node-gyp-rebuild native deps: uiohook-napi ships N-API prebuilds
# (ABI-stable, they load fine under Electron), and this machine has no C++
# toolchain. node-gyp-build picks the right prebuild at runtime.
npmRebuild: false

# What gets packed into the app. The compiled Electron entrypoints plus the
# built client (renderer/) produced by `npm run build:renderer`.
files:
  - dist-electron/**/*
  - renderer/**/*
  - package.json

# Auto-update feed: GitHub Releases on the public repo. electron-updater reads
# the latest release's assets (installer + latest.yml) — no token needed at
# runtime on a public repo. Publishing needs GH_TOKEN: `npm run publish`, or
# upload the release/ artifacts to a GitHub release manually.
publish:
  provider: github
  owner: reef-sharkord
  repo: reef

win:
  target:
    - nsis
    - portable

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  artifactName: REEF-Setup-${version}.${ext}

portable:
  artifactName: REEF-Portable-${version}.${ext}

mac:
  target:
    - dmg
  category: public.app-category.social-networking
  artifactName: REEF-${version}.${ext}

linux:
  target:
    - AppImage
  category: Network
  artifactName: REEF-${version}.${ext}
